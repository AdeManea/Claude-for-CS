name: story-builder
description: >
  Extracts and structures a customer success story from cs-platform and CRM
  records for use in case studies, testimonials, video briefs, or event abstracts.
  For case studies, produces a four-section narrative (Before State, Why They
  Chose, The Journey, Results). For testimonials, produces 1–3 draft quote
  structures with mandatory CSM validation and legal review requirements.
  Labels all evidence as Measured, Documented, or Estimated. Surfaces evidence
  gaps that marketing must fill before publication.
model: claude-sonnet-4-7
system:
  file: ./story-builder.md
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
  - { type: mcp_toolset, mcp_server_name: cs-platform, default_config: { enabled: true } }
  - { type: mcp_toolset, mcp_server_name: crm,         default_config: { enabled: true } }
mcp_servers:
  - { type: url, name: cs-platform, url: "${CS_PLATFORM_MCP_URL}" }
  - { type: url, name: crm,         url: "${CRM_MCP_URL}" }
