name: learning-extractor
description: >
  Synthesizes exit interview and postmortem outputs into categorized, tagged playbook
  learnings. Each learning is mapped to a churn category, assigned a priority, and
  linked to the lifecycle stage where intervention could have changed the outcome.
  Operates sequentially after both Step 2 subagents complete. Produces a structured
  learning set for inclusion in Section 6 of the Churn Intelligence Report.
model: claude-sonnet-4-7
system:
  file: ./learning-extractor.md
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
  - { type: mcp_toolset, mcp_server_name: cs-platform, default_config: { enabled: true } }
  - { type: mcp_toolset, mcp_server_name: crm,         default_config: { enabled: true } }
mcp_servers:
  - { type: url, name: cs-platform, url: "${CS_PLATFORM_MCP_URL}" }
  - { type: url, name: crm,         url: "${CRM_MCP_URL}" }
